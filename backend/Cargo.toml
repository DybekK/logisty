[workspace]
members = ["users"]
resolver = "2"

[workspace.dependencies]
async-trait = "0.1.81"
dotenvy = "0.15.7"
lambda_http = "0.12.0"
thiserror = "1"
cuid = "1"
chrono = "0.4.38"
serde_json = "1"
serde = { version = "1", features = ["derive"] }
tokio = { version = "1", features = ["macros"] }
sqlx = { version = "0.7", features = ["runtime-tokio", "postgres", "chrono"] }
