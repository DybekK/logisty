name: Users Service CI

on:
  push:
    paths:
      - 'backend/services/users/**'
  pull_request:
    paths:
      - 'backend/services/users/**'

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
      - name: Install dependencies
        run: cd backend/services/users && yarn
      - name: Run tests
        run: yarn test
